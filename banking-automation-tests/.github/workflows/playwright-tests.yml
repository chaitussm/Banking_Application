name: Playwright Java Automation Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit

jobs:
  test:
    name: Run E2E Tests (${{ github.event.inputs.browser || 'chromium' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [ chromium ]   # Extend to [chromium, firefox, webkit] for multi-browser

    steps:
      # -----------------------------------------------------------------------
      # Checkout test repository
      # -----------------------------------------------------------------------
      - name: Checkout automation tests
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Checkout application source (Banking_Application)
      # -----------------------------------------------------------------------
      - name: Checkout Banking Application
        uses: actions/checkout@v4
        with:
          repository: chaitussm/Banking_Application
          path: banking-app

      # -----------------------------------------------------------------------
      # Node.js – needed to run the banking app
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            banking-app/backend/package-lock.json
            banking-app/frontend/package-lock.json

      # -----------------------------------------------------------------------
      # Install and start the backend
      # -----------------------------------------------------------------------
      - name: Install backend dependencies
        run: npm ci
        working-directory: banking-app/backend

      - name: Start backend server
        run: npm run dev &
        working-directory: banking-app/backend
        env:
          PORT: 4000

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/health && break
            echo "Waiting for backend... attempt $i"
            sleep 2
          done

      # -----------------------------------------------------------------------
      # Install and start the frontend
      # -----------------------------------------------------------------------
      - name: Install frontend dependencies
        run: npm ci
        working-directory: banking-app/frontend

      - name: Build frontend
        run: npm run build
        working-directory: banking-app/frontend

      - name: Serve frontend
        run: npx serve -s dist -l 5173 &
        working-directory: banking-app/frontend

      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 && break
            echo "Waiting for frontend... attempt $i"
            sleep 2
          done

      # -----------------------------------------------------------------------
      # Java + Maven
      # -----------------------------------------------------------------------
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      # -----------------------------------------------------------------------
      # Install Playwright browsers
      # -----------------------------------------------------------------------
      - name: Install Playwright browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps ${{ matrix.browser }}"

      # -----------------------------------------------------------------------
      # Run tests
      # -----------------------------------------------------------------------
      - name: Run Playwright tests
        run: |
          mvn test \
            -Dplaywright.browser=${{ matrix.browser }} \
            -Dbase.url=http://localhost:5173 \
            -Dbackend.url=http://localhost:4000 \
            -Dheadless=true \
            -Dvideo.recording=retain-on-failure \
            -Dtrace.recording=retain-on-failure

      # -----------------------------------------------------------------------
      # Upload artifacts on failure
      # -----------------------------------------------------------------------
      - name: Upload test traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: target/traces/
          retention-days: 7

      - name: Upload test videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos-${{ matrix.browser }}
          path: target/videos/
          retention-days: 7

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.browser }}
          path: target/surefire-reports/
          retention-days: 7
