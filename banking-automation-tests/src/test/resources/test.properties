# -------------------------------------------------------------------------
# Banking Application – Automation Test Configuration
# -------------------------------------------------------------------------
# Override any of these values via -D<key>=<value> on the Maven command line
# or via environment variables (see TestConfig.java for resolution order).
# -------------------------------------------------------------------------

# Frontend base URL
base.url=http://localhost:5173

# Backend base URL (used in API-level helper calls)
backend.url=http://localhost:4000

# Browser: chromium | firefox | webkit
playwright.browser=chromium

# Run browser in headless mode
headless=true

# Slow motion delay in ms (0 = disabled)
slow.mo=0

# Default timeouts (ms)
default.timeout=30000
navigation.timeout=30000

# Screenshot on failure: true | false
screenshot.on.failure=true

# Video recording: off | on | retain-on-failure
video.recording=retain-on-failure

# Trace recording: off | on | retain-on-failure
trace.recording=retain-on-failure

# -------------------------------------------------------------------------
# Seeded Test Users (matching backend/src/db/database.js seed data)
