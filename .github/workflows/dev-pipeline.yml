name: Dev Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    # 10:00 PM IST = 4:30 PM UTC
    - cron: "30 16 * * *"
  workflow_dispatch:

run-name: "Dev Pipeline - ${{ github.event_name }} @ ${{ github.ref_name }}"

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Validate backend server syntax
        working-directory: backend
        run: node --check src/server.js

      - name: Validate backend store syntax
        working-directory: backend
        run: node --check src/data/store.js

      - name: Package backend artifact
        run: |
          mkdir -p artifacts/backend
          cp -R backend/src artifacts/backend/src
          cp backend/package.json artifacts/backend/package.json
          cp backend/package-lock.json artifacts/backend/package-lock.json

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: artifacts/backend
          if-no-files-found: error

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          if-no-files-found: error
