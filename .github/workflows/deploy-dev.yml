name: Deploy Dev

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

run-name: "Deploy Dev - ${{ github.event_name }} @ ${{ github.ref_name }}"

jobs:
  deploy-dev:
    name: Deploy To Dev Server
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_SSH_PORT }}
          script: |
            set -e
            echo "Changing to app directory..."
            cd "${{ secrets.DEV_APP_DIR }}"
            echo "Pulling latest changes from origin ${{ github.ref_name }}..."
            git pull origin ${{ github.ref_name }}
            echo "Running restart command..."
            ${{ secrets.DEV_RESTART_CMD }}
            echo "Deployment complete."

      - name: Write deployment summary
        if: always()
        run: |
          STATUS="success"
          if [ "${{ job.status }}" != "success" ]; then STATUS="failed"; fi
          echo "## Deployment Report — DEV (SSH)" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | ${{ github.ref }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
