name: Deploy Pipeline

on:
  push:
    branches:
      - master
  workflow_run:
    workflows: ["Dev Pipeline"]
    types: [completed]
  workflow_dispatch:

run-name: "Deploy Pipeline - ${{ github.event_name }}"

jobs:
  deploy-dev:
    name: Deploy To Dev
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dev secret presence diagnostics
        env:
          DEV_SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          DEV_SSH_USER: ${{ secrets.DEV_SSH_USER }}
          DEV_SSH_KEY: ${{ secrets.DEV_SSH_KEY }}
          DEV_APP_DIR: ${{ secrets.DEV_APP_DIR }}
        run: |
          for v in DEV_SSH_HOST DEV_SSH_USER DEV_SSH_KEY DEV_APP_DIR; do
            if [ -n "${!v}" ]; then
              echo "present: $v"
            else
              echo "missing: $v"
            fi
          done

      - name: Validate dev deployment secrets
        env:
          DEV_SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          DEV_SSH_USER: ${{ secrets.DEV_SSH_USER }}
          DEV_SSH_KEY: ${{ secrets.DEV_SSH_KEY }}
          DEV_APP_DIR: ${{ secrets.DEV_APP_DIR }}
        run: |
          missing=""
          for v in DEV_SSH_HOST DEV_SSH_USER DEV_SSH_KEY DEV_APP_DIR; do
            if [ -z "${!v}" ]; then
              missing="$missing $v"
            fi
          done
          if [ -n "$missing" ]; then
            echo "Missing required dev secrets:$missing"
            exit 1
          fi

      - name: Validate dev SSH key format
        env:
          DEV_SSH_KEY: ${{ secrets.DEV_SSH_KEY }}
        run: |
          if ! printf '%s\n' "$DEV_SSH_KEY" | ssh-keygen -y -f /dev/stdin > /dev/null 2>&1; then
            echo "::error::DEV_SSH_KEY is not a valid SSH private key."
            echo "Ensure the secret contains a properly formatted private key"
            echo "(e.g. starting with '-----BEGIN OPENSSH PRIVATE KEY-----')."
            exit 1
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_SSH_KEY }}

      - name: Add dev host to known_hosts
        env:
          DEV_SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          DEV_SSH_PORT: ${{ secrets.DEV_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEV_SSH_PORT:-22}" -H "$DEV_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy to dev
        env:
          DEV_SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          DEV_SSH_USER: ${{ secrets.DEV_SSH_USER }}
          DEV_SSH_PORT: ${{ secrets.DEV_SSH_PORT }}
          DEV_APP_DIR: ${{ secrets.DEV_APP_DIR }}
          DEV_RESTART_CMD: ${{ secrets.DEV_RESTART_CMD }}
        run: |
          rsync -az --delete -e "ssh -p ${DEV_SSH_PORT:-22}" ./ "$DEV_SSH_USER@$DEV_SSH_HOST:${DEV_APP_DIR}/"
          ssh -p "${DEV_SSH_PORT:-22}" "$DEV_SSH_USER@$DEV_SSH_HOST" "
            set -e
            cd '${DEV_APP_DIR}'
            cd backend && npm ci
            cd ../frontend && npm ci && npm run build
            if [ -n '${DEV_RESTART_CMD}' ]; then
              eval '${DEV_RESTART_CMD}'
            fi
          "

      - name: Upload dev deployment bundle
        uses: actions/upload-artifact@v4
        with:
          name: dev-deploy-bundle
          path: |
            frontend/dist
            backend/src
            backend/package.json

      - name: Write deployment summary
        if: always()
        run: |
          STATUS="success"
          if [ "${{ job.status }}" != "success" ]; then STATUS="failed"; fi
          echo "## Deployment Report — DEV" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | ${{ github.ref }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

